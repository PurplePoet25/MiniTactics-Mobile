name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.37

      - name: Clean old Buildozer cache
        run: |
          rm -rf .buildozer bin apk-output

      - name: Build APK
        run: |
          yes | buildozer android debug 2>&1 | tee buildozer_full_log.txt || true

      - name: Collect APK files
        if: always()
        run: |
          mkdir -p apk-output
          find . -name "*.apk" -type f -print -exec cp {} apk-output/ \;
          ls -la apk-output

      - name: Upload full Buildozer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-full-log
          path: buildozer_full_log.txt

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MiniTactics-Pocket-Warboard-APK
          path: apk-output/*.apk
